<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Writing Ideas — Tom-Blogs-Manager</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --card: rgba(255,255,255,0.92);
      --ink: #1f2831;
      --muted: #6b7580;
      --line: rgba(31,40,49,0.12);
      --accent: #2f7a5f;
      --strong-bg: #d5f2e5; --strong-fg: #186246;
      --moderate-bg: #fef3cd; --moderate-fg: #856404;
      --weak-bg: #f0f0f0; --weak-fg: #6c757d;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh; color: var(--ink);
      font-family: "Space Grotesk","Segoe UI",sans-serif;
      background: linear-gradient(140deg, var(--bg), #eaf0ec);
    }
    .app { max-width: 900px; margin: 0 auto; padding: 28px 16px 60px; }
    header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    h1 { font-size: 1.8rem; }
    .kicker { text-transform: uppercase; letter-spacing: .09em; color: var(--muted); font-size: 12px; font-weight: 700; margin-bottom: 2px; }
    .meta { color: var(--muted); font-size: 12px; }
    .idea-card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 16px; padding: 20px; margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(25,38,32,.06);
      transition: transform .12s;
    }
    .idea-card:hover { transform: translateY(-2px); }
    .idea-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
    .idea-title { font-size: 1.05rem; font-weight: 700; line-height: 1.35; flex: 1; }
    .idea-title a { color: inherit; text-decoration: none; }
    .idea-title a:hover { color: var(--accent); }
    .badge {
      border-radius: 999px; padding: 4px 12px; font-size: 11px;
      font-weight: 700; white-space: nowrap; flex-shrink: 0;
    }
    .badge.strong { background: var(--strong-bg); color: var(--strong-fg); }
    .badge.moderate { background: var(--moderate-bg); color: var(--moderate-fg); }
    .badge.weak { background: var(--weak-bg); color: var(--weak-fg); }
    .score-total { font-size: 1.6rem; font-weight: 800; color: var(--accent); margin-right: 6px; }
    .score-max { font-size: .85rem; color: var(--muted); }
    .score-bar { display: flex; gap: 6px; margin: 10px 0; flex-wrap: wrap; }
    .dim {
      flex: 1; min-width: 100px;
      background: #f4f4f2; border-radius: 10px; padding: 8px 10px;
      text-align: center;
    }
    .dim-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .dim-val { font-size: 1.1rem; font-weight: 700; }
    .idea-meta {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
      margin-top: 10px; font-size: 13px; color: var(--muted);
    }
    .tag {
      background: #eef0f2; border-radius: 6px; padding: 3px 8px;
      font-size: 12px; font-weight: 600;
    }
    .angle {
      margin-top: 10px; padding: 10px 14px;
      background: #f9f7f4; border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0; font-size: 13.5px; line-height: 1.5;
      color: #3a4a42;
    }
    .empty {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 15px;
    }
    .date-btn {
      border: 1px solid var(--line); border-radius: 8px; padding: 6px 14px;
      font: inherit; font-size: 13px; font-weight: 600;
      color: var(--muted); background: var(--card); cursor: pointer;
      transition: all .12s;
    }
    .date-btn:hover { border-color: var(--accent); color: var(--accent); }
    .date-btn.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .idea-date { font-size: 12px; color: var(--muted); }
    .section-label {
      font-size: 14px; font-weight: 700; color: var(--accent);
      margin: 20px 0 10px; padding-bottom: 6px;
      border-bottom: 2px solid var(--accent);
    }
    @media (max-width: 600px) {
      .score-bar { flex-direction: column; }
      .dim { min-width: unset; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <p class="kicker">Writing Ideas</p>
        <h1>博客选题推荐</h1>
      </div>
      <div style="text-align:right">
        <div id="genMeta" class="meta"></div>
      </div>
    </header>
    <div class="panel" style="background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:18px;box-shadow:0 8px 24px rgba(25,38,32,.06);">
      <div style="font-weight:700;margin-bottom:8px;color:var(--accent);">看到想写的选题？</div>
      <div style="font-size:13.5px;line-height:1.6;color:#3a4a42;">
        通过 mailbox 告诉 Tom-Blogs-Manager，请包含以下信息：<br/>
        <b>1. 选哪个：</b>选题标题或链接<br/>
        <b>2. 你的角度：</b>你想从什么视角切入？强调什么？<br/>
        <b>3. 你的经历：</b>你在这个话题上有什么亲身经历或实践？<br/>
        <b>4. 核心观点：</b>你最想传达的一两个判断是什么？<br/>
        <span style="color:var(--muted);font-size:12px;">提供的信息越具体，写出来的文章越像你。</span>
      </div>
    </div>
    <div id="dateFilter" style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;"></div>
    <div id="ideas"></div>
  </main>
<script>
const DIM_LABELS = {
  audience_reach: '受众覆盖',
  distribution_potential: '传播潜力',
  author_differentiation: '作者独特性',
  timeliness: '时效性',
  series_potential: '系列化',
};
const REC_LABELS = { strong: '强烈推荐', moderate: '值得考虑', weak: '优先级低' };

let allData = null;
let activeDate = 'all';

function renderIdea(idea) {
  const s = idea.scores;
  const rec = idea.recommendation;
  const dims = Object.entries(DIM_LABELS).map(([k, label]) => {
    const val = s[k] || 0;
    const color = val >= 4 ? '#186246' : val >= 3 ? '#856404' : '#6c757d';
    return `<div class="dim"><div class="dim-label">${label}</div><div class="dim-val" style="color:${color}">${val}</div></div>`;
  }).join('');

  return `
    <div class="idea-card">
      <div class="idea-header">
        <div class="idea-title"><a href="${idea.url}" target="_blank">${idea.title}</a></div>
        <span class="badge ${rec}">${REC_LABELS[rec] || rec}</span>
      </div>
      <div style="display:flex;align-items:baseline;gap:8px">
        <span class="score-total">${s.total}</span><span class="score-max">/ 25</span>
        <span class="idea-date">${idea.date || ''}</span>
      </div>
      <div class="score-bar">${dims}</div>
      <div class="angle">${idea.suggested_angle}</div>
      <div class="idea-meta">
        <span class="tag">${idea.content_line}</span>
        <span>来源: ${idea.source}</span>
      </div>
    </div>`;
}

function renderDateFilter(dates) {
  const filter = document.getElementById('dateFilter');
  let html = `<button class="date-btn ${activeDate === 'all' ? 'active' : ''}" onclick="setDate('all')">全部</button>`;
  for (const d of dates) {
    html += `<button class="date-btn ${activeDate === d ? 'active' : ''}" onclick="setDate('${d}')">${d}</button>`;
  }
  filter.innerHTML = html;
}

function renderIdeas(ideas) {
  const root = document.getElementById('ideas');
  if (!ideas || ideas.length === 0) {
    root.innerHTML = '<div class="empty">该日期暂无选题推荐</div>';
    return;
  }
  const strong = ideas.filter(i => i.recommendation === 'strong');
  const moderate = ideas.filter(i => i.recommendation === 'moderate');
  const weak = ideas.filter(i => i.recommendation === 'weak');

  let html = '';
  if (strong.length) {
    html += '<div class="section-label">强烈推荐</div>';
    html += strong.map(renderIdea).join('');
  }
  if (moderate.length) {
    html += '<div class="section-label">值得考虑</div>';
    html += moderate.map(renderIdea).join('');
  }
  if (weak.length) {
    html += '<div class="section-label">优先级低</div>';
    html += weak.map(renderIdea).join('');
  }
  root.innerHTML = html;
}

function setDate(d) {
  activeDate = d;
  if (!allData) return;
  renderDateFilter(allData.dates || []);
  const filtered = activeDate === 'all'
    ? allData.ideas
    : allData.ideas.filter(i => i.date === activeDate);
  renderIdeas(filtered);
}

async function loadIdeas() {
  const meta = document.getElementById('genMeta');
  try {
    const resp = await fetch('data/ideas.json');
    if (!resp.ok) throw new Error('No data');
    allData = await resp.json();
    renderDateFilter(allData.dates || []);
    const filtered = activeDate === 'all'
      ? allData.ideas
      : allData.ideas.filter(i => i.date === activeDate);
    renderIdeas(filtered);
    meta.textContent = `更新时间: ${allData.generated_at || '未知'} | 保留最近7天`;
  } catch (e) {
    document.getElementById('ideas').innerHTML = '<div class="empty">加载失败，请稍后重试</div>';
  }
}

loadIdeas();
</script>
</body>
</html>
